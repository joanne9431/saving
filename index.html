<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposit Tracker</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-color: #4f46e5;       
            --success-color: #0d9488;       
            --warning-color: #f97316;       
            --bg-color: #f8fafc;            
            --card-bg: #ffffff;
            --text-main: #334155;           
            --text-muted: #94a3b8;          
            --expired-color: #cbd5e1;       
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px 10px; /* 超緊湊版面：再度縮減網頁上下四周留白 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto;
        }

        /* Dashboard Overview */
        .dashboard {
            background: linear-gradient(135deg, #e0f2fe 0%, #e0e7ff 100%);
            color: #1e3a8a;
            padding: 8px 14px; /* 壓縮留白 */
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(224, 231, 255, 0.3);
            margin-bottom: 10px; /* 縮減與下方元件的間距 */
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            gap: 4px; 
        }

        .dash-row {
            padding-bottom: 2px;
        }

        .dash-row:first-child {
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding-bottom: 4px;
        }

        .dash-label {
            font-size: 0.7rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 流光微動效外層包裹器 */
        .dash-value-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
            min-width: 110px;
        }

        .dash-value {
            font-size: 1.25rem; /* 微調縮小字體 */
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #0f172a;
            transition: opacity 0.2s ease;
        }

        /* 流光微動效遮罩 */
        .secure-mask {
            position: absolute;
            top: 2px;
            left: 0;
            width: 100%;
            height: calc(100% - 4px);
            background: linear-gradient(90deg, #cbd5e1 25%, #e2e8f0 50%, #cbd5e1 75%);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: shimmer 1.5s infinite linear;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .is-hidden .dash-value { opacity: 0; }
        .is-hidden .secure-mask { opacity: 1; pointer-events: auto; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            padding: 10px 14px; /* 壓縮留白 */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.01);
            margin-bottom: 10px; 
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .form-card.editing-mode {
            border-color: var(--primary-color);
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.06);
        }

        /* 核心修正：讓 5 個欄位（包含日期）完美平分空間，不再有任何欄位單獨佔滿一行 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 電腦版改為平分 5 欄 */
            gap: 8px; /* 縮小欄位間距 */
            margin-bottom: 8px;
        }

        /* 行動裝置自動切換排版 */
        @media (max-width: 650px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr); /* 手機版每行 2 欄 */
            }
            .date-row-mobile {
                grid-column: span 2; /* 手機版螢幕太窄時，日期格再自動延伸填滿防變形 */
            }
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 2px;
        }

        input, select {
            width: 100%;
            padding: 5px 8px; /* 緊湊輸入框：減少上下與左右內襯 */
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 0.8rem; /* 微調字體大小 */
            background-color: #f8fafc;
            color: var(--text-main);
            height: 30px; /* 固定控制項高度，看起來更整齊流暢 */
            transition: all 0.2s;
        }

        /* 特別美化調整原生日期選擇格 */
        input[type="date"] {
            font-family: inherit;
            padding: 4px 6px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .btn-container {
            display: flex;
            gap: 6px;
        }

        button.add-btn {
            flex: 2;
            background-color: var(--success-color);
            color: white;
            border: none;
            height: 30px; /* 與輸入框等高 */
            padding: 0;
            border-radius: 5px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
        }

        button.add-btn.update-style {
            background-color: var(--primary-color);
        }

        button.cancel-btn {
            flex: 1;
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            height: 30px;
            padding: 0;
            border-radius: 5px;
            font-size: 0.82rem;
            cursor: pointer;
            display: none;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
            text-align: center;
        }

        /* Deposit List */
        .list-title {
            font-size: 0.85rem;
            margin-bottom: 4px; 
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.5px;
        }

        /* 獨立滾動軸容器與極小高度壓縮 */
        #depositList {
            display: flex;
            flex-direction: column;
            gap: 5px; 
            margin-bottom: 10px; 
            
            max-height: 340px;      /* 調整限高，讓整體頁面不超出一個螢幕 */
            overflow-y: auto;       
            padding-right: 2px;     
            scrollbar-width: thin;  
        }

        #depositList::-webkit-scrollbar {
            width: 4px; /* 更細的滾動條 */
        }
        #depositList::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 2px;
        }

        .deposit-card {
            background: var(--card-bg);
            padding: 8px 12px; /* 緊湊卡片留白 */
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.01);
            display: flex;
            justify-content: space-between;
            align-items: flex-start; 
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
            position: relative;
        }

        .card-main {
            display: flex;
            flex-direction: column;
            gap: 1px; 
            flex-grow: 1;
        }

        .bank-tag {
            background: #f0fdf4;
            color: #166534;
            padding: 0px 5px;
            border-radius: 8px;
            font-size: 0.62rem;
            font-weight: 600;
            width: fit-content;
        }

        .card-details {
            font-size: 0.9rem; 
            font-weight: 600;
            color: #1e293b;
        }

        .card-sub-line {
            font-size: 0.75rem; 
            color: #64748b;
            line-height: 1.2;
        }
        
        .card-sub-line strong {
            color: #475569;
        }

        .card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            gap: 6px; 
            flex-shrink: 0;
            margin-left: 8px;
            min-width: 85px; 
        }

        .countdown {
            font-weight: 600;
            color: #b91c1c;
            font-size: 0.75rem;
            text-align: right;
            white-space: nowrap; 
        }

        .action-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0px 1px;
        }

        .action-btn:hover { color: #ef4444; }
        .action-btn.edit-btn-text:hover { color: var(--primary-color); }

        .btn-backup { 
            width: 100%;
            height: 32px; /* 壓縮按鈕高度 */
            border-radius: 5px;
            border: none;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            background-color: #fef3c7; 
            color: #92400e; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-backup:hover { background-color: #fde68a; }

        .deposit-card.expired {
            background-color: #f8fafc;
            color: var(--expired-color);
            opacity: 0.55;
            box-shadow: none;
        }
        .deposit-card.expired .bank-tag { background: #f1f5f9; color: #94a3b8; }
        .deposit-card.expired .card-details { color: #94a3b8; text-decoration: line-through; }
        .deposit-card.expired .countdown { color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">

    <div class="dashboard">
        <div class="dash-row">
            <div class="dash-label">Total Principal</div>
            <div id="wrapperDeposit" class="dash-value-wrapper is-hidden" onclick="toggleVisibility('wrapperDeposit')">
                <div id="totalDeposit" class="dash-value">$0.00</div>
                <div class="secure-mask"></div>
            </div>
        </div>
        
        <div class="dash-row">
            <div class="dash-label"><span id="interestYearLabel">Current Year</span> Matured Interest</div>
            <div id="wrapperInterest" class="dash-value-wrapper" onclick="toggleVisibility('wrapperInterest')">
                <div id="totalInterest" class="dash-value">$0.00</div>
                <div class="secure-mask"></div>
            </div>
        </div>
    </div>

    <div id="formCard" class="form-card">
        <div class="form-grid">
            <div>
                <label>Bank Name</label>
               <select id="bank">
                    <option value="HSBC">HSBC</option>
                    <option value="Livi">Livi</option>
                    <option value="BOCHK">BOCHK</option>
                    <option value="MOX">MOX</option>
                    <option value="MOX (USD)">MOX (USD)</option>
                    <option value="Other Bank">Other Bank</option>
                </select>
            </div>
            <div>
                <label>Amount ($)</label>
                <input type="number" id="amount" placeholder="e.g., 100000">
            </div>
            <div>
                <label>Term</label>
                <select id="months" onchange="onDateParameterChange('term')">
                    <option value="1">1 Month</option>
                    <option value="2">2 Months</option>
                    <option value="3" selected>3 Months</option>
                    <option value="6">6 Months</option>
                    <option value="12">12 Months</option>
                </select>
            </div>
            <div>
                <label>Rate (% p.a.)</label>
                <input type="number" id="rate" placeholder="e.g., 3.8" step="0.01">
            </div>
            <div class="date-row-mobile">
                <label>Maturity Date</label>
                <input type="date" id="expiryDate" onchange="onDateParameterChange('maturity')">
            </div>
        </div>
        
        <div class="btn-container">
            <button id="submitBtn" class="add-btn" onclick="handleFormSubmit()">Add Deposit Record</button>
            <button id="cancelBtn" class="cancel-btn" onclick="exitEditMode()">Cancel</button>
        </div>
        
        <div id="errorMsg" class="error-msg">Please fill out all fields correctly.</div>
    </div>

    <div class="list-title">Active & Matured Records</div>
    <div id="depositList"></div>

    <div style="padding: 0 1px;">
        <button class="btn-backup" onclick="exportToExcelXLSX()">Export Excel File</button>
    </div>

</div>

<script>
    let deposits = JSON.parse(localStorage.getItem('my_term_deposits'));
    let editingId = null;
    let currentCalculatedStartDate = ""; 
    let userHasManuallyChangedMaturity = false; 
    
    if (!deposits || deposits.length === 0) {
        deposits = [
            { id: 1, bank: "HSBC", amount: 200000, rate: 4.1, months: 6, startDate: "2026-01-15", expiryDate: "2026-07-15" },
            { id: 2, bank: "ZA Bank", amount: 50000, rate: 3.8, months: 12, startDate: "2025-11-01", expiryDate: "2026-11-01" }
        ];
        saveToLocalStorage();
    }

    window.onload = function() {
        resetFormDates();
    };

    function calculateShiftedDate(baseDateStr, monthsToShift, isForward = true) {
        let parts = baseDateStr.split('-');
        let year = parseInt(parts[0], 10);
        let month = parseInt(parts[1], 10) - 1; 
        let day = parseInt(parts[2], 10);

        let tempDate = new Date(year, month, 1);
        
        if (isForward) {
            tempDate.setMonth(tempDate.getMonth() + monthsToShift);
        } else {
            tempDate.setMonth(tempDate.getMonth() - monthsToShift);
        }

        let targetYear = tempDate.getFullYear();
        let targetMonth = tempDate.getMonth();
        
        let maxDaysInTargetMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
        let finalDay = Math.min(day, maxDaysInTargetMonth);
        
        let finalMonthStr = String(targetMonth + 1).padStart(2, '0');
        let finalDayStr = String(finalDay).padStart(2, '0');
        
        return `${targetYear}-${finalMonthStr}-${finalDayStr}`;
    }

    function onDateParameterChange(triggerType) {
        const monthsSelect = document.getElementById('months');
        const expiryInput = document.getElementById('expiryDate');
        const selectedMonths = parseInt(monthsSelect.value);

        if (editingId !== null) {
            if (triggerType === 'term') {
                if (currentCalculatedStartDate) {
                    expiryInput.value = calculateShiftedDate(currentCalculatedStartDate, selectedMonths, true);
                }
            } else if (triggerType === 'maturity') {
                if (expiryInput.value) {
                    currentCalculatedStartDate = calculateShiftedDate(expiryInput.value, selectedMonths, false);
                }
            }
        } else {
            if (triggerType === 'term') {
                if (!userHasManuallyChangedMaturity) {
                    const today = new Date();
                    currentCalculatedStartDate = today.toISOString().split('T')[0];
                    expiryInput.value = calculateShiftedDate(currentCalculatedStartDate, selectedMonths, true);
                } else {
                    if (expiryInput.value) {
                        currentCalculatedStartDate = calculateShiftedDate(expiryInput.value, selectedMonths, false);
                    }
                }
            } else if (triggerType === 'maturity') {
                userHasManuallyChangedMaturity = true;
                if (expiryInput.value) {
                    currentCalculatedStartDate = calculateShiftedDate(expiryInput.value, selectedMonths, false);
                }
            }
        }
        renderStatus();
    }

    function resetFormDates() {
        editingId = null;
        userHasManuallyChangedMaturity = false;
        
        const today = new Date();
        currentCalculatedStartDate = today.toISOString().split('T')[0];
        
        const monthsSelect = document.getElementById('months');
        const selectedMonths = parseInt(monthsSelect.value);
        
        document.getElementById('expiryDate').value = calculateShiftedDate(currentCalculatedStartDate, selectedMonths, true);
        renderStatus();
    }

    function toggleVisibility(id) {
        document.getElementById(id).classList.toggle('is-hidden');
    }

    function saveToLocalStorage() {
        localStorage.setItem('my_term_deposits', JSON.stringify(deposits));
    }

    function renderStatus(targetYearForInterest = null) {
        const listContainer = document.getElementById('depositList');
        const today = new Date();
        today.setHours(0,0,0,0);

        const currentSystemYear = today.getFullYear();
        const activeYear = targetYearForInterest || currentSystemYear;
        document.getElementById('interestYearLabel').innerText = `${activeYear}`;

        let totalDeposit = 0;
        let totalInterestFull = 0;

        deposits.forEach(item => {
            if (!item.startDate) {
                item.startDate = calculateShiftedDate(item.expiryDate, (item.months || 3), false);
            }

            const expiry = new Date(item.expiryDate);
            const expiryYear = parseInt(item.expiryDate.split('-')[0]);
            
            if (expiry >= today) {
                totalDeposit += parseFloat(item.amount);
            }

            if (expiry < today && expiryYear === activeYear) {
                let totalInterestEarned = parseFloat(item.amount) * (parseFloat(item.rate) / 100) * (parseInt(item.months) / 12);
                totalInterestFull += totalInterestEarned;
            }
        });

        document.getElementById('totalDeposit').innerText = `$${totalDeposit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('totalInterest').innerText = `$${totalInterestFull.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

        deposits.sort((a, b) => {
            const isAExpired = new Date(a.expiryDate) < today;
            const isBExpired = new Date(b.expiryDate) < today;
            if (isAExpired && !isBExpired) return 1;
            if (!isAExpired && isBExpired) return -1;
            return new Date(a.expiryDate) - new Date(b.expiryDate);
        });

        listContainer.innerHTML = '';

        const oneYearAgo = new Date();
        oneYearAgo.setDate(oneYearAgo.getDate() - 365);

        deposits.forEach(item => {
            const startDateObj = new Date(item.startDate);
            if (startDateObj < oneYearAgo) return; 

            const expiry = new Date(item.expiryDate);
            const isExpired = expiry < today;
            const timeDiff = expiry.getTime() - today.getTime();
            const daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));

            let countdownText = isExpired ? "Matured" : (daysLeft === 0 ? "Matures Today!" : `${daysLeft} days left`);
            const actualItemInterest = item.amount * (item.rate / 100) * (item.months / 12);

            const card = document.createElement('div');
            card.className = `deposit-card ${isExpired ? 'expired' : ''}`;
            
            card.innerHTML = `
                <div class="card-main">
                    <span class="bank-tag">${item.bank}</span>
                    <div class="card-details">$${parseFloat(item.amount).toLocaleString()} @ ${item.rate}% (${item.months}M)</div>
                    <div class="card-sub-line"><strong>Start Date:</strong> ${item.startDate}</div>
                    <div class="card-sub-line"><strong>Maturity:</strong> ${item.expiryDate}</div>
                    <div class="card-sub-line"><strong>Net Interest:</strong> $${actualItemInterest.toFixed(2)}</div>
                </div>
                <div class="card-right">
                    <span class="countdown">${countdownText}</span>
                    <div class="action-group">
                        <button class="action-btn edit-btn-text" onclick="startEdit(${item.id})">Edit</button>
                        <button class="action-btn" onclick="deleteDeposit(${item.id})">Delete</button>
                    </div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    function handleFormSubmit() {
        const bank = document.getElementById('bank').value;
        const amount = document.getElementById('amount').value;
        const months = document.getElementById('months').value;
        const rate = document.getElementById('rate').value;
        const expiryDate = document.getElementById('expiryDate').value;
        const errorMsg = document.getElementById('errorMsg');

        if (!amount || !rate || !expiryDate || parseFloat(amount) <= 0 || parseFloat(rate) <= 0) {
            errorMsg.style.display = 'block';
            return;
        }
        errorMsg.style.display = 'none';

        let finalStartDate = currentCalculatedStartDate;

        if (!finalStartDate) {
            finalStartDate = calculateShiftedDate(expiryDate, parseInt(months), false);
        }

        if (editingId !== null) {
            const index = deposits.findIndex(d => d.id === editingId);
            if (index !== -1) {
                deposits[index] = {
                    id: editingId,
                    bank,
                    amount: parseFloat(amount),
                    rate: parseFloat(rate),
                    months: parseInt(months),
                    startDate: finalStartDate,
                    expiryDate
                };
            }
            exitEditMode();
        } else {
            const newDeposit = {
                id: Date.now(),
                bank,
                amount: parseFloat(amount),
                rate: parseFloat(rate),
                months: parseInt(months),
                startDate: finalStartDate, 
                expiryDate
            };
            deposits.push(newDeposit);
        }

        saveToLocalStorage();
        renderStatus();

        document.getElementById('amount').value = '';
        document.getElementById('rate').value = '';
        resetFormDates();
    }

    function startEdit(id) {
        const item = deposits.find(d => d.id === id);
        if (!item) return;

        editingId = id;
        currentCalculatedStartDate = item.startDate; 

        document.getElementById('bank').value = item.bank;
        document.getElementById('amount').value = item.amount;
        document.getElementById('months').value = item.months;
        document.getElementById('rate').value = item.rate;
        document.getElementById('expiryDate').value = item.expiryDate;

        const formCard = document.getElementById('formCard');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        formCard.classList.add('editing-mode');
        submitBtn.innerText = "Update Record";
        submitBtn.classList.add('update-style');
        cancelBtn.style.display = "block";

        formCard.scrollIntoView({ behavior: 'smooth' });
    }

    function exitEditMode() {
        document.getElementById('amount').value = '';
        document.getElementById('rate').value = '';

        const formCard = document.getElementById('formCard');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        formCard.classList.remove('editing-mode');
        submitBtn.innerText = "Add Deposit Record";
        submitBtn.classList.remove('update-style');
        cancelBtn.style.display = "none";
        
        resetFormDates();
    }

    function deleteDeposit(id) {
        if (editingId === id) {
            exitEditMode();
        }

        if(confirm('Are you sure you want to delete this record?')) {
            deposits = deposits.filter(item => item.id !== id);
            saveToLocalStorage();
            renderStatus();
        }
    }

    function exportToExcelXLSX() {
        if (deposits.length === 0) return alert("There is no data to export yet!");
        if (typeof XLSX === 'undefined') return alert("SheetJS library not loaded.");

        let availableYears = new Set();
        deposits.forEach(d => {
            if (d.expiryDate) {
                let year = d.expiryDate.split('-')[0];
                availableYears.add(year);
            }
        });
        let sortedYears = Array.from(availableYears).sort((a, b) => b - a); 

        const sysDate = new Date();
        const currentSystemYear = String(sysDate.getFullYear());
        let selectedYear = currentSystemYear;

        if (sortedYears.length > 1) {
            let yearPrompt = prompt(
                `Detected data across multiple years.\nAvailable years: ${sortedYears.join(', ')}\n\nPlease enter the year you want to export:`, 
                currentSystemYear
            );
            if (yearPrompt === null) return; 
            yearPrompt = yearPrompt.trim();
            if (!sortedYears.includes(yearPrompt)) {
                return alert(`Invalid year choice!`);
            }
            selectedYear = yearPrompt;
        } else if (sortedYears.length === 1) {
            selectedYear = sortedYears[0];
        }

        renderStatus(parseInt(selectedYear));

        let filteredDeposits = deposits.filter(d => d.expiryDate && d.expiryDate.startsWith(selectedYear));

        if (filteredDeposits.length === 0) {
            return alert(`No data found maturing in the year ${selectedYear}.`);
        }

        filteredDeposits.sort((a, b) => a.expiryDate.localeCompare(b.expiryDate));

        let sheetRows = [
            ["Start Date", "Maturity Date", "Bank Name", "Principal Amount", "Interest Rate", "Term", "Net Interest"]
        ];

        let totalMaturedInterestForYear = 0;

        filteredDeposits.forEach(d => {
            let totalInterest = d.amount * (d.rate / 100) * (d.months / 12);
            const expiry = new Date(d.expiryDate);
            
            if (expiry < sysDate) {
                totalMaturedInterestForYear += totalInterest;
            }

            sheetRows.push([
                d.startDate,
                d.expiryDate,
                d.bank,
                `$${d.amount.toLocaleString()}`,
                `${d.rate}%`,
                `${d.months} M`,
                `$${totalInterest.toFixed(2)}`
            ]);
        });

        sheetRows.push(["", "", "", "", "", "", ""]); 
        sheetRows.push([
            `${selectedYear} Report Summary`, 
            "", 
            "", 
            "", 
            "", 
            "", 
            `Total Matured Annual Interest: $${totalMaturedInterestForYear.toFixed(2)}`
        ]);

        let wb = XLSX.utils.book_new();
        let ws = XLSX.utils.aoa_to_sheet(sheetRows);
        ws['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 18 }, { wch: 22 }, { wch: 12 }, { wch: 12 }, { wch: 22 }]; 
        
        XLSX.utils.book_append_sheet(wb, ws, `Deposit_Report_${selectedYear}`);
        XLSX.writeFile(wb, `Deposit_Report_${selectedYear}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
</script>
