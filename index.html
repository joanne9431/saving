<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposit Tracker</title>
    <style>
        :root {
            --primary-color: #4f46e5;       
            --success-color: #0d9488;       
            --warning-color: #f97316;       
            --bg-color: #f8fafc;            
            --card-bg: #ffffff;
            --text-main: #334155;           
            --text-muted: #94a3b8;          
            --expired-color: #cbd5e1;       
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px; /* 【緊湊】縮減網頁四周留白 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px; /* 【緊湊】稍微縮減最大寬度 */
            margin: 0 auto;
        }

        /* Dashboard Overview */
        .dashboard {
            background: linear-gradient(135deg, #e0f2fe 0%, #e0e7ff 100%);
            color: #1e3a8a;
            padding: 14px 20px; /* 【緊湊】縮減儀表板內邊距 */
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(224, 231, 255, 0.4);
            margin-bottom: 18px; /* 【緊湊】縮減下方間距 */
            border: 1px solid rgba(255, 255, 255, 0.6);
            
            display: flex;
            flex-direction: column;
            gap: 8px; /* 【緊湊】縮減行距 */
        }

        .dash-row {
            padding-bottom: 2px;
        }

        .dash-row:first-child {
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding-bottom: 8px;
        }

        .dash-label {
            font-size: 0.75rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dash-value {
            font-size: 1.4rem; /* 【緊湊】微調金額字體大小 */
            font-weight: 600;
            letter-spacing: -0.3px;
            transition: filter 0.3s ease;
            color: #0f172a;
        }

        .blur-effect {
            filter: blur(8px);
            user-select: none;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #cbd5e1;
            color: #64748b;
            padding: 1px 6px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.65rem;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: #fff;
            color: var(--primary-color);
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            padding: 16px 20px; /* 【緊湊】縮減表單內邊距 */
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.01);
            margin-bottom: 22px; /* 【緊湊】縮減下方間距 */
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .form-card.editing-mode {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.08);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); /* 【緊湊】微調最小寬度 */
            gap: 12px; /* 【緊湊】縮減輸入框之間的間隙 */
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 4px;
        }

        input, select {
            width: 100%;
            padding: 8px 12px; /* 【緊湊】縮減輸入框內邊距，降低高度 */
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.85rem;
            background-color: #f8fafc;
            color: var(--text-main);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        button.add-btn {
            flex: 2;
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 9px; /* 【緊湊】降低按鈕高度 */
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }

        button.add-btn.update-style {
            background-color: var(--primary-color);
        }

        button.cancel-btn {
            flex: 1;
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            padding: 9px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            display: none;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
            text-align: center;
        }

        /* Deposit List */
        .list-title {
            font-size: 1rem;
            margin-bottom: 10px; /* 【緊湊】縮減標題下方空間 */
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.5px;
        }

        #depositList {
            display: flex;
            flex-direction: column;
            gap: 8px; /* 【緊湊】讓列表卡片排得更緊密 */
        }

        .deposit-card {
            background: var(--card-bg);
            padding: 12px 18px; /* 【緊湊】縮減定存卡片的上下內邊距 */
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.01);
            display: flex;
            justify-content: space-between;
            align-items: flex-start; 
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
            position: relative;
        }

        /* 左側主要資訊區 */
        .card-main {
            display: flex;
            flex-direction: column;
            gap: 4px; /* 【緊湊】縮減文字行與行之間的間距 */
            flex-grow: 1;
        }

        .bank-tag {
            background: #f0fdf4;
            color: #166534;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            width: fit-content;
            margin-bottom: 1px;
        }

        .card-details {
            font-size: 1.05rem; /* 【緊湊】微調卡片內主標題大小 */
            font-weight: 600;
            color: #1e293b;
        }

        /* 分行顯示的副資訊樣式 */
        .card-sub-line {
            font-size: 0.8rem; /* 【緊湊】微調字體 */
            color: #64748b;
            line-height: 1.3;
        }
        
        .card-sub-line strong {
            color: #475569;
        }

        /* 右側資訊群組：包含倒數日期和按鈕 */
        .card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            gap: 12px; /* 【緊湊】縮減倒數與按鈕之間的垂直間距 */
            flex-shrink: 0;
            margin-left: 15px;
            min-width: 100px; 
        }

        .countdown {
            font-weight: 600;
            color: #b91c1c;
            font-size: 0.8rem;
            text-align: right;
            white-space: nowrap; 
        }

        /* 按鈕群組 */
        .action-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: none;
            padding: 0px 2px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #ef4444;
        }

        .action-btn.edit-btn-text {
            color: #94a3b8;
        }

        .action-btn.edit-btn-text:hover {
            color: var(--primary-color);
        }

        /* Expired Item Styling */
        .deposit-card.expired {
            background-color: #f8fafc;
            color: var(--expired-color);
            opacity: 0.55;
            box-shadow: none;
        }
        
        .deposit-card.expired .bank-tag {
            background: #f1f5f9;
            color: #94a3b8;
        }

        .deposit-card.expired .card-details {
            color: #94a3b8;
            text-decoration: line-through;
        }

        .deposit-card.expired .countdown {
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="dashboard">
        <div class="dash-row">
            <div class="dash-label">
                Total Principal (Active)
                <button class="toggle-btn" onclick="toggleVisibility('totalDeposit')">Hide/Show</button>
            </div>
            <div id="totalDeposit" class="dash-value blur-effect">$0.00</div>
        </div>
        
        <div class="dash-row">
            <div class="dash-label">
                Total Term Interest (Annual Total)
                <button class="toggle-btn" onclick="toggleVisibility('totalInterest')">Hide/Show</button>
            </div>
            <div id="totalInterest" class="dash-value">$0.00</div>
        </div>
    </div>

    <div id="formCard" class="form-card">
        <div class="form-grid">
            <div>
                <label>Bank Name</label>
                <select id="bank">
                    <option value="HSBC">HSBC</option>
                    <option value="Standard Chartered">Standard Chartered</option>
                    <option value="BOCHK">BOCHK</option>
                    <option value="Hang Seng Bank">Hang Seng Bank</option>
                    <option value="ZA Bank">ZA Bank</option>
                    <option value="Other Bank">Other Bank</option>
                </select>
            </div>
            <div>
                <label>Deposit Amount ($)</label>
                <input type="number" id="amount" placeholder="e.g., 100000">
            </div>
            <div>
                <label>Deposit Term</label>
                <select id="months" onchange="updateMaturityDate()">
                    <option value="1">1 Month</option>
                    <option value="2">2 Months</option>
                    <option value="3">3 Months</option>
                    <option value="6">6 Months</option>
                    <option value="12" selected>12 Months</option>
                </select>
            </div>
            <div>
                <label>Interest Rate (% p.a.)</label>
                <input type="number" id="rate" placeholder="e.g., 3.8" step="0.01">
            </div>
            <div>
                <label>Maturity Date</label>
                <input type="date" id="expiryDate">
            </div>
        </div>
        
        <div class="btn-container">
            <button id="submitBtn" class="add-btn" onclick="handleFormSubmit()">Add Deposit Record</button>
            <button id="cancelBtn" class="cancel-btn" onclick="exitEditMode()">Cancel</button>
        </div>
        
        <div id="errorMsg" class="error-msg">Please fill out all fields correctly.</div>
    </div>

    <div class="list-title">Active & Matured Records</div>
    <div id="depositList"></div>

</div>

<script>
    let deposits = JSON.parse(localStorage.getItem('my_term_deposits'));
    let editingId = null;
    let userHasManuallyChangedDate = false;
    
    if (!deposits || deposits.length === 0) {
        deposits = [
            { id: 1, bank: "HSBC", amount: 200000, rate: 4.1, months: 6, expiryDate: "2026-12-31" },
            { id: 2, bank: "ZA Bank", amount: 50000, rate: 3.8, months: 3, expiryDate: "2026-10-15" }
        ];
        saveToLocalStorage();
    }

    window.onload = function() {
        document.getElementById('expiryDate').addEventListener('input', function() {
            userHasManuallyChangedDate = true;
        });
        updateMaturityDate(); 
    };

    function updateMaturityDate() {
        if (editingId !== null || userHasManuallyChangedDate) {
            renderStatus();
            return;
        }

        const today = new Date();
        const selectedMonths = parseInt(document.getElementById('months').value);
        today.setMonth(today.getMonth() + selectedMonths);
        
        document.getElementById('expiryDate').value = today.toISOString().split('T')[0];
        renderStatus();
    }

    function toggleVisibility(id) {
        document.getElementById(id).classList.toggle('blur-effect');
    }

    function saveToLocalStorage() {
        localStorage.setItem('my_term_deposits', JSON.stringify(deposits));
    }

    function renderStatus() {
        const listContainer = document.getElementById('depositList');
        const today = new Date();
        today.setHours(0,0,0,0);

        let totalDeposit = 0;
        let totalInterest = 0;

        deposits.forEach(item => {
            const expiry = new Date(item.expiryDate);
            const itemInterest = parseFloat(item.amount) * (parseFloat(item.rate) / 100) * (parseInt(item.months) / 12);
            
            if (expiry >= today) {
                totalDeposit += parseFloat(item.amount);
            }
            totalInterest += itemInterest;
        });

        document.getElementById('totalDeposit').innerText = `$${totalDeposit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('totalInterest').innerText = `$${totalInterest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

        deposits.sort((a, b) => {
            const isAExpired = new Date(a.expiryDate) < today;
            const isBExpired = new Date(b.expiryDate) < today;
            if (isAExpired && !isBExpired) return 1;
            if (!isAExpired && isBExpired) return -1;
            return new Date(a.expiryDate) - new Date(b.expiryDate);
        });

        listContainer.innerHTML = '';

        deposits.forEach(item => {
            const expiry = new Date(item.expiryDate);
            const isExpired = expiry < today;
            const timeDiff = expiry.getTime() - today.getTime();
            const daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));

            let countdownText = isExpired ? "Matured" : (daysLeft === 0 ? "Matures Today!" : `${daysLeft} days left`);
            const actualItemInterest = item.amount * (item.rate / 100) * (item.months / 12);

            const card = document.createElement('div');
            card.className = `deposit-card ${isExpired ? 'expired' : ''}`;
            
            /* 【緊湊優化】移除 Emoji，改用簡潔的 strong 標籤分類，視覺上更加乾淨 */
            card.innerHTML = `
                <div class="card-main">
                    <span class="bank-tag">${item.bank}</span>
                    <div class="card-details">$${parseFloat(item.amount).toLocaleString()} @ ${item.rate}% (${item.months}M)</div>
                    <div class="card-sub-line"><strong>Maturity:</strong> ${item.expiryDate}</div>
                    <div class="card-sub-line"><strong>Net Interest:</strong> $${actualItemInterest.toFixed(2)}</div>
                </div>
                <div class="card-right">
                    <span class="countdown">${countdownText}</span>
                    <div class="action-group">
                        <button class="action-btn edit-btn-text" onclick="startEdit(${item.id})">Edit</button>
                        <button class="action-btn" onclick="deleteDeposit(${item.id})">Delete</button>
                    </div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    // 後續邏輯保持不變
    function handleFormSubmit() {
        const bank = document.getElementById('bank').value;
        const amount = document.getElementById('amount').value;
        const months = document.getElementById('months').value;
        const rate = document.getElementById('rate').value;
        const expiryDate = document.getElementById('expiryDate').value;
        const errorMsg = document.getElementById('errorMsg');

        if (!amount || !rate || !expiryDate || parseFloat(amount) <= 0 || parseFloat(rate) <= 0) {
            errorMsg.style.display = 'block';
            return;
        }
        errorMsg.style.display = 'none';

        if (editingId !== null) {
            const index = deposits.findIndex(d => d.id === editingId);
            if (index !== -1) {
                deposits[index] = {
                    id: editingId,
                    bank,
                    amount: parseFloat(amount),
                    rate: parseFloat(rate),
                    months: parseInt(months),
                    expiryDate
                };
            }
            exitEditMode();
        } else {
            const newDeposit = {
                id: Date.now(),
                bank,
                amount: parseFloat(amount),
                rate: parseFloat(rate),
                months: parseInt(months),
                expiryDate
            };
            deposits.push(newDeposit);
        }

        saveToLocalStorage();
        userHasManuallyChangedDate = false; 
        renderStatus();

        document.getElementById('amount').value = '';
        document.getElementById('rate').value = '';
        updateMaturityDate();
    }

    function startEdit(id) {
        const item = deposits.find(d => d.id === id);
        if (!item) return;

        editingId = id;

        document.getElementById('bank').value = item.bank;
        document.getElementById('amount').value = item.amount;
        document.getElementById('months').value = item.months;
        document.getElementById('rate').value = item.rate;
        document.getElementById('expiryDate').value = item.expiryDate;

        const formCard = document.getElementById('formCard');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        formCard.classList.add('editing-mode');
        submitBtn.innerText = "Update Record";
        submitBtn.classList.add('update-style');
        cancelBtn.style.display = "block";

        formCard.scrollIntoView({ behavior: 'smooth' });
    }

    function exitEditMode() {
        editingId = null;
        userHasManuallyChangedDate = false;

        const formCard = document.getElementById('formCard');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        formCard.classList.remove('editing-mode');
        submitBtn.innerText = "Add Deposit Record";
        submitBtn.classList.remove('update-style');
        cancelBtn.style.display = "none";

        document.getElementById('amount').value = '';
        document.getElementById('rate').value = '';
        
        updateMaturityDate();
    }

    function deleteDeposit(id) {
        if (editingId === id) {
            exitEditMode();
        }

        if(confirm('Are you sure you want to delete this record?')) {
            deposits = deposits.filter(item => item.id !== id);
            saveToLocalStorage();
            renderStatus();
        }
    }
</script>

</body>
</html>
